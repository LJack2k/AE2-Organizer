name: Publish to Modrinth

# Runs after the "Release" workflow finishes successfully on a tag (workflow_run
# is used instead of release:published because a release created by GITHUB_TOKEN
# doesn't fire downstream release events). Or run manually: Actions → Publish to
# Modrinth → Run workflow → enter the tag (e.g. v1.2.0-mc1.21.1) to retry just Modrinth.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.2.0-mc1.21.1)'
        required: true
        type: string

permissions:
  contents: read    # for `gh release download` and the source checkout

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' ||
            (github.event.workflow_run.conclusion == 'success' &&
             startsWith(github.event.workflow_run.head_branch, 'v')) }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ inputs.tag || github.event.workflow_run.head_branch }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Check out the *tagged* commit (not the default branch) so gradle.properties
      # describes the MC line being published. This is what lets one workflow serve
      # every line (1.21.1, 26.1, ...) — nothing about the version is hardcoded.
      - name: Checkout the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Read build properties
        id: props
        run: |
          echo "mc=$(grep -E '^minecraft_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "java=$(grep -E '^java_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "modver=$(grep -E '^mod_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "loaders=$(grep -E '^mod_loaders=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Download jar from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dist --pattern '*.jar'
          ls -la dist

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # Modrinth project ID (base62). The slug "ae2-organizer" can't be used
          # here: Modrinth ids are base62, so its hyphen is rejected by the API.
          modrinth-id: xugd56Pv
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: dist/*.jar

          name: AE2Organizer-${{ steps.props.outputs.loaders }}-${{ steps.props.outputs.mc }}-${{ steps.props.outputs.modver }}.jar
          # +<mc> build-metadata keeps the version unique per MC line on the platforms.
          version: "${{ steps.props.outputs.modver }}+${{ steps.props.outputs.mc }}"
          version-type: release

          loaders: ${{ steps.props.outputs.loaders }}
          game-versions: ${{ steps.props.outputs.mc }}
          java: ${{ steps.props.outputs.java }}

          # AE2 is required; JEI is optional. Slugs from modrinth.com/mod/<slug>.
          dependencies: |
            ae2(required){modrinth:ae2}
            jei(optional){modrinth:jei}

          changelog: |
            See the [release notes on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}).
