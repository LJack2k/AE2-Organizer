# Builds the mod and publishes it to Modrinth, CurseForge, and a GitHub Release.
#
# Runs when a GitHub Release is published (or manually via Actions -> Publish).
# A platform is skipped automatically if its id/token isn't set, so you can turn
# them on one at a time.
#
# One-time setup (repo -> Settings -> Secrets and variables -> Actions):
#   Secrets:   MODRINTH_TOKEN, CURSEFORGE_TOKEN
#   Variables: MODRINTH_ID  (Modrinth project id or slug)
#              CURSEFORGE_ID (CurseForge numeric project id)
# GitHub releases need no extra token (GITHUB_TOKEN is provided automatically).
#
# To cut a release: bump mod_version in gradle.properties, commit, then publish a
# GitHub Release with a tag like v0.0.5. The release body becomes the changelog.

name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # let mc-publish attach the jar to the GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew :neoforge:build

      - name: Publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: neoforge/build/libs/AE2Organizer-*.jar

          # Loaders, Minecraft versions and the required-AE2 dependency are read
          # from neoforge.mods.toml; these just make them explicit / add JEI.
          loaders: neoforge
          game-versions: '1.21.1'
          version-type: release
          dependencies: |
            ae2(required)
            jei(optional)

          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
