name: Release

# Fires when you push a git tag starting with "v" — e.g. v0.0.5.
#   bump mod_version in gradle.properties to match, commit, then:
#     git tag v0.0.5
#     git push origin v0.0.5
#
# This workflow ONLY builds the jar and creates the GitHub Release. The
# CurseForge + Modrinth uploads are separate workflows that run after this one
# completes (see publish-curseforge.yml / publish-modrinth.yml), so a single
# platform can be retried without rebuilding.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # create the GitHub Release and attach the jar

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build the mod
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

      - name: Compute version from tag
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # Omitting curseforge-id/modrinth-id makes mc-publish only create the
        # GitHub Release here; the platform publishes pick up from there.
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: |
            **/build/libs/!(*-sources).jar

          name: AE2Organizer-neoforge-1.21.1-${{ steps.ver.outputs.value }}.jar
          version: ${{ steps.ver.outputs.value }}
          version-type: release

          loaders: neoforge
          game-versions: 1.21.1
          java: 21

          changelog: |
            See the [release notes on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}).

            Full changelog: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
