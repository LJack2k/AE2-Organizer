name: Release

# Fires when you push a git tag starting with "v" — e.g. v0.0.5.
#   bump mod_version in gradle.properties to match, commit, then:
#     git tag v0.0.5
#     git push origin v0.0.5
#
# This workflow ONLY builds the jar and creates the GitHub Release. The
# CurseForge + Modrinth uploads are separate workflows that run after this one
# completes (see publish-curseforge.yml / publish-modrinth.yml), so a single
# platform can be retried without rebuilding.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # create the GitHub Release and attach the jar

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Single source of truth: read the MC version, Java version and mod version
      # from gradle.properties so this one workflow serves every MC line
      # (1.21.1, 26.1, ...). Nothing about the target version is hardcoded here.
      - name: Read build properties
        id: props
        run: |
          echo "mc=$(grep -E '^minecraft_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "java=$(grep -E '^java_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "modver=$(grep -E '^mod_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "loaders=$(grep -E '^mod_loaders=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.props.outputs.java }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build the mod
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

      - name: Create GitHub Release
        # Omitting curseforge-id/modrinth-id makes mc-publish only create the
        # GitHub Release here; the platform publishes pick up from there.
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: |
            **/build/libs/!(*-sources).jar

          name: AE2Organizer-${{ steps.props.outputs.loaders }}-${{ steps.props.outputs.mc }}-${{ steps.props.outputs.modver }}.jar
          # +<mc> build-metadata keeps the version unique per MC line on Modrinth
          # (e.g. 1.2.0+1.21.1 vs 1.2.0+26.1), which requires unique version numbers.
          version: "${{ steps.props.outputs.modver }}+${{ steps.props.outputs.mc }}"
          version-type: release

          loaders: ${{ steps.props.outputs.loaders }}
          game-versions: ${{ steps.props.outputs.mc }}
          java: ${{ steps.props.outputs.java }}

          changelog: |
            See the [release notes on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}).

            Full changelog: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
